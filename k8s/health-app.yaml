apiVersion: v1
kind: Namespace
metadata:
  name: health-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-app
  namespace: health-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-app
  template:
    metadata:
      labels:
        app: health-app
    spec:
      containers:
        - name: health-app
          image: your-dockerhub-user/2098-health:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: health-app-service
  namespace: health-app
spec:
  type: NodePort
  selector:
    app: health-app
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080